<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>末日抉择：第一视角生存</title>
  <style>
    :root {
      --bg-1: #0b0d10;
      --bg-2: #1a1f2a;
      --ink: #e6e6e6;
      --muted: #a3abb6;
      --accent: #d96b4c;
      --accent-2: #4ca6d9;
      --card: #11151b;
      --danger: #d94c4c;
      --good: #5bd98a;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: radial-gradient(1200px 800px at 20% 10%, #1a2330 0%, var(--bg-1) 55%) ,
                  radial-gradient(800px 600px at 80% 90%, #1a1f2a 0%, var(--bg-2) 65%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap {
      width: min(980px, 100%);
      background: linear-gradient(180deg, rgba(17,21,27,0.95), rgba(11,13,16,0.95));
      border: 1px solid #1f2632;
      border-radius: 16px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
      overflow: hidden;
    }
    header {
      padding: 24px 28px;
      border-bottom: 1px solid #1f2632;
      background: linear-gradient(90deg, rgba(217,107,76,0.12), rgba(76,166,217,0.08));
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      font-size: 22px;
      margin: 0;
      letter-spacing: 1px;
    }
    header .meta {
      font-size: 12px;
      color: var(--muted);
    }
    .content {
      display: grid;
      grid-template-columns: 1.4fr 0.6fr;
      gap: 0;
    }
    .panel {
      padding: 24px 28px 28px;
      border-right: 1px solid #1f2632;
      min-height: 520px;
    }
    .panel:last-child {
      border-right: none;
    }
    .narrative {
      font-size: 16px;
      line-height: 1.7;
      color: var(--ink);
      margin-bottom: 18px;
      white-space: pre-wrap;
    }
    .choices {
      display: grid;
      gap: 12px;
    }
    .btn {
      background: #1a202a;
      border: 1px solid #2b3342;
      color: var(--ink);
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: #3b465a; box-shadow: 0 8px 20px rgba(0,0,0,0.35); }
    .btn:active { transform: translateY(0); }
    .btn.primary { background: linear-gradient(90deg, #d96b4c, #d94c4c); border: none; }
    .btn.secondary { background: linear-gradient(90deg, #4ca6d9, #4c7ad9); border: none; }

    .stats {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat {
      background: var(--card);
      padding: 12px 14px;
      border: 1px solid #222a36;
      border-radius: 12px;
    }
    .stat .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .bar {
      height: 8px;
      background: #1b222d;
      border-radius: 999px;
      overflow: hidden;
    }
    .bar > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #5bd98a, #d9c84c);
      width: 50%;
      transition: width 200ms ease;
    }

    .log {
      background: var(--card);
      border: 1px solid #222a36;
      border-radius: 12px;
      padding: 12px;
      max-height: 260px;
      overflow: auto;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    footer {
      padding: 16px 28px;
      border-top: 1px solid #1f2632;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      background: rgba(17,21,27,0.6);
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .content { grid-template-columns: 1fr; }
      .panel { border-right: none; border-bottom: 1px solid #1f2632; }
      .panel:last-child { border-bottom: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>末日抉择：第一视角生存</h1>
        <div class="meta">男性第一视角 · 写实生存 · 随机事件驱动</div>
      </div>
    </header>

    <div class="content">
      <section class="panel">
        <div id="narrative" class="narrative"></div>
        <div class="choices" id="choices"></div>
      </section>

      <aside class="panel">
        <div class="stats">
          <div class="stat">
            <div class="label">体力</div>
            <div class="bar"><span id="stat-health"></span></div>
          </div>
          <div class="stat">
            <div class="label">理智</div>
            <div class="bar"><span id="stat-sanity"></span></div>
          </div>
          <div class="stat">
            <div class="label">物资</div>
            <div class="bar"><span id="stat-supplies"></span></div>
          </div>
          <div class="stat">
            <div class="label">信任</div>
            <div class="bar"><span id="stat-trust"></span></div>
          </div>
          <div class="stat">
            <div class="label">感染风险</div>
            <div class="bar"><span id="stat-infection"></span></div>
          </div>
        </div>

        <div class="log" id="log"></div>
      </aside>
    </div>

    <footer>
      <span>提示：你的每一次选择都会改变剧情走向，结局取决于现实因素的叠加。</span>
      <button class="btn secondary" id="restart">重新开始</button>
    </footer>
  </div>

  <script>
    const state = {
      day: 1,
      health: 80,
      sanity: 75,
      supplies: 65,
      trust: 50,
      infection: 10,
      flags: {
        joinedGroup: false,
        harmedInnocent: false,
        foundFamily: false,
        radioContact: false,
        baseSecured: false,
        moralDebt: 0
      }
    };

    const logEl = document.getElementById('log');
    const narrativeEl = document.getElementById('narrative');
    const choicesEl = document.getElementById('choices');

    function clampStat(value) {
      return Math.max(0, Math.min(100, value));
    }

    function updateBars() {
      document.getElementById('stat-health').style.width = `${state.health}%`;
      document.getElementById('stat-sanity').style.width = `${state.sanity}%`;
      document.getElementById('stat-supplies').style.width = `${state.supplies}%`;
      document.getElementById('stat-trust').style.width = `${state.trust}%`;
      document.getElementById('stat-infection').style.width = `${state.infection}%`;
    }

    function addLog(text) {
      const line = document.createElement('div');
      line.textContent = `第${state.day}天：${text}`;
      logEl.prepend(line);
    }

    function checkEndings() {
      if (state.health <= 0 || state.sanity <= 0 || state.infection >= 100) {
        return {
          title: '终局：失去自我',
          body: '身体或精神先于世界崩塌。你没有死在丧尸手里，却被现实的冷酷一点点耗尽。',
          style: 'danger'
        };
      }
      if (state.supplies <= 0) {
        return {
          title: '终局：饥饿与暴露',
          body: '没有物资，所有选择都变得徒劳。你被迫离开熟悉的区域，结果只是更快耗尽。',
          style: 'danger'
        };
      }
      if (state.day >= 14) {
        if (state.baseSecured && state.trust >= 60 && state.infection < 30) {
          return {
            title: '结局：短暂的秩序',
            body: '你与少数幸存者建立了临时据点。真实世界没有英雄，只有彼此撑住的普通人。你知道明天仍会艰难，但今天至少活着。',
            style: 'good'
          };
        }
        if (state.radioContact && state.supplies >= 40) {
          return {
            title: '结局：撤离',
            body: '无线电的坐标兑现了诺言。你一路避开高风险区，靠谨慎和判断活到了撤离点。你不会忘记那些没能跟上的人。',
            style: 'good'
          };
        }
        return {
          title: '结局：灰色延续',
          body: '你活下来了，但一切都没有变好。真实世界的末日不是爆炸，而是日复一日的耗损。你还在走，没人知道尽头在哪。',
          style: 'neutral'
        };
      }
      return null;
    }

    function renderEnding(ending) {
      narrativeEl.textContent = `${ending.title}\n\n${ending.body}`;
      choicesEl.innerHTML = '';
      const btn = document.createElement('button');
      btn.className = 'btn primary';
      btn.textContent = '重新开始';
      btn.onclick = () => window.location.reload();
      choicesEl.appendChild(btn);
      addLog(ending.title);
    }

    function applyEffects(effects) {
      Object.entries(effects).forEach(([key, delta]) => {
        if (key in state) {
          state[key] = clampStat(state[key] + delta);
        }
      });
    }

    function nextEvent() {
      const ending = checkEndings();
      if (ending) return renderEnding(ending);

      const event = pickEvent();
      narrativeEl.textContent = event.text;
      choicesEl.innerHTML = '';

      event.choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'btn';
        btn.textContent = choice.label;
        btn.onclick = () => {
          state.day += 1;
          applyEffects(choice.effects);
          if (choice.flags) {
            Object.entries(choice.flags).forEach(([k,v]) => state.flags[k] = v);
          }
          if (choice.moralDebt) state.flags.moralDebt += choice.moralDebt;
          addLog(choice.log);
          updateBars();
          nextEvent();
        };
        choicesEl.appendChild(btn);
      });
    }

    function pickEvent() {
      const pool = events.filter(e => !e.condition || e.condition(state));
      return pool[Math.floor(Math.random() * pool.length)];
    }

    const events = [
      {
        text: "你在废弃便利店门口看见一辆翻倒的摩托车，车边有血迹。你知道这里可能有物资，也可能有埋伏。",
        choices: [
          {
            label: "谨慎搜查，先看窗内动静",
            effects: { sanity: 2, supplies: 8 },
            log: "你没有贸然进入，趁机会捡到几盒能量棒。"
          },
          {
            label: "直接进入，快速搜刮",
            effects: { health: -6, supplies: 14, infection: 5 },
            log: "你冲进去抢到更多物资，但被玻璃划伤。"
          },
          {
            label: "放弃，绕路前行",
            effects: { sanity: -2 },
            log: "你保持谨慎，但错过了可能的补给。"
          }
        ]
      },
      {
        text: "一名疲惫的中年男人向你求助，他的妻子被困在对面楼里。你能听到楼内零散的嘶吼声。",
        choices: [
          {
            label: "带他一起尝试营救",
            effects: { health: -5, sanity: 6, trust: 8 },
            log: "你冒险进入楼内，救出女人，获得信任。"
          },
          {
            label: "给他一部分物资，让他自己去",
            effects: { supplies: -8, sanity: 2, trust: -2 },
            log: "你把风险交给了他自己。"
          },
          {
            label: "拒绝，继续赶路",
            effects: { sanity: -6, trust: -6 },
            log: "你选择了自保，但心里多了一层阴影。",
            moralDebt: 1
          }
        ]
      },
      {
        text: "夜里，你听见无线电里传来断断续续的信号，似乎在呼叫撤离点。",
        choices: [
          {
            label: "冒险靠近信号源",
            effects: { sanity: 4, supplies: -5 },
            log: "你锁定了大致方位，代价是消耗了时间和燃料。",
            flags: { radioContact: true }
          },
          {
            label: "继续静默，避免暴露位置",
            effects: { sanity: -2, trust: 2 },
            log: "你决定不冒风险，保持隐蔽。"
          }
        ]
      },
      {
        text: "一支临时幸存者小队邀请你加入，他们有一辆车和少量武器，但领导者显得强硬。",
        condition: s => !s.flags.joinedGroup,
        choices: [
          {
            label: "加入他们，接受规则",
            effects: { trust: 12, supplies: 6, sanity: 4 },
            log: "你获得了团队，但也失去部分自主。",
            flags: { joinedGroup: true }
          },
          {
            label: "婉拒，自行行动",
            effects: { sanity: -3, trust: -4 },
            log: "你继续单独行动，压力随之加重。"
          }
        ]
      },
      {
        text: "你发现一处尚未被完全破坏的居民楼，楼顶可以作为安全观察点，但通道狭窄。",
        choices: [
          {
            label: "设法封锁通道，建立临时据点",
            effects: { supplies: -10, sanity: 6, trust: 5 },
            log: "你花了不少物资建立了相对安全的藏身处。",
            flags: { baseSecured: true }
          },
          {
            label: "只短暂停留观察",
            effects: { sanity: 1 },
            log: "你补了一口气，但不敢久留。"
          }
        ]
      },
      {
        text: "一名青年偷走了你背包里的一瓶水。你抓住了他，他眼神里充满恐惧。",
        choices: [
          {
            label: "夺回物资，放他走",
            effects: { sanity: 2, trust: 2 },
            log: "你保持了底线，但没有多做伤害。"
          },
          {
            label: "以暴制暴，震慑他人",
            effects: { sanity: -4, trust: -8, supplies: 4 },
            log: "你拿回东西，也让自己更像末日的一部分。",
            moralDebt: 2
          },
          {
            label: "给他一点水，打发他",
            effects: { supplies: -6, sanity: 4, trust: 6 },
            log: "你选择保留善意，但物资更紧张了。"
          }
        ]
      },
      {
        text: "你在狭窄巷道里遇到两只游荡的丧尸，前方只有一间小仓库可躲。",
        choices: [
          {
            label: "冲进仓库并锁门",
            effects: { health: -4, sanity: 3 },
            log: "你险些被咬到，仓库里找到少量医疗包。",
          },
          {
            label: "绕路但耗费体力",
            effects: { health: -6, sanity: -1 },
            log: "你躲过了正面冲突，但体力消耗明显。"
          }
        ]
      },
      {
        text: "你看到远处有人在楼顶挥舞衣物示意求救，但那里周围丧尸密度极高。",
        choices: [
          {
            label: "尝试绕道接近，评估情况",
            effects: { sanity: 3, supplies: -4 },
            log: "你没有贸然进入高危区，仍试图寻找方法。"
          },
          {
            label: "直接放弃，避免牵连",
            effects: { sanity: -3, trust: -2 },
            log: "你选择保命，救援难度过高。",
            moralDebt: 1
          }
        ]
      },
      {
        text: "你在停车场发现一辆仍有油的面包车，钥匙却不见了。",
        choices: [
          {
            label: "尝试撬开点火",
            effects: { sanity: 2, supplies: -4 },
            log: "你勉强启动了车辆，获得了快速移动的能力。",
            flags: { foundFamily: true }
          },
          {
            label: "放弃，继续徒步",
            effects: { health: -3 },
            log: "你保持低调，但速度更慢。"
          }
        ]
      },
      {
        text: "你的手臂伤口开始发热，恐惧和疑惑同时涌上来。",
        condition: s => s.infection >= 35,
        choices: [
          {
            label: "消耗药品压制感染",
            effects: { supplies: -10, infection: -15, sanity: 2 },
            log: "你用掉了珍贵的药物，感染略有缓解。"
          },
          {
            label: "忍耐，节省物资",
            effects: { infection: 10, sanity: -6 },
            log: "你赌了一把，但身体状况变糟。"
          }
        ]
      },
      {
        text: "你与小队发生意见冲突，他们想抢夺另一队的物资。",
        condition: s => s.flags.joinedGroup,
        choices: [
          {
            label: "参与行动",
            effects: { supplies: 10, sanity: -6, trust: -4 },
            log: "你得到了物资，却感到沉重。",
            moralDebt: 2
          },
          {
            label: "拒绝并劝阻",
            effects: { trust: -6, sanity: 2 },
            log: "你试图守住底线，团队关系紧张。"
          }
        ]
      },
      {
        text: "你在地铁入口听到孩子的哭声，周围黑暗而安静。",
        choices: [
          {
            label: "进入地铁寻找来源",
            effects: { health: -5, sanity: 4, trust: 6 },
            log: "你找到一对母子并护送出来。"
          },
          {
            label: "留在地面，避免陷阱",
            effects: { sanity: -4 },
            log: "你没有冒险，但心情难以平复。",
            moralDebt: 1
          }
        ]
      }
    ];

    document.getElementById('restart').addEventListener('click', () => window.location.reload());
    updateBars();
    nextEvent();
  </script>
</body>
</html>
