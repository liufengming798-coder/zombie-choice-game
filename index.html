<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>魔都生存手记</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="skyline-canvas" aria-hidden="true"></canvas>
  <div class="overlay-noise" aria-hidden="true"></div>

  <main class="app-shell">
    <header class="hud-top">
      <div class="brand-wrap">
        <h1>魔都生存手记</h1>
        <p id="hook-text"></p>
      </div>
      <div class="world-wrap">
        <div class="world-chip" id="world-district">区域: -</div>
        <div class="world-chip" id="world-road">道路: -</div>
        <div class="world-chip" id="world-record">纪录: -</div>
        <div class="world-chip danger" id="world-pressure">威胁: -</div>
      </div>
      <div class="top-actions">
        <button id="btn-save" class="btn ghost">保存</button>
        <button id="btn-load" class="btn ghost">读取</button>
        <button id="btn-restart" class="btn warn">重开</button>
      </div>
    </header>

    <section class="identity-bar">
      <span id="id-name" class="chip">身份: 未命名</span>
      <span id="id-status" class="chip">状态: -</span>
      <span id="stage-tag" class="chip stage"></span>
      <span id="event-category" class="chip category">事件类型: -</span>
    </section>

    <section class="battlefield-grid">
      <article class="scene-panel">
        <div id="scene-stage" class="scene-stage neutral" aria-hidden="true">
          <div class="pulse-ring ring-a"></div>
          <div class="pulse-ring ring-b"></div>
          <div class="scan-line"></div>
          <div class="scene-label" id="scene-label">NEUTRAL</div>
        </div>

        <div class="scene-header">
          <h2 id="event-title"></h2>
          <div class="scene-sub">横向塔罗卡选择: 鼠标滚轮横移，按 <kbd>1-9</kbd> 快速选牌</div>
        </div>
        <p id="event-body"></p>
        <p id="event-result" class="result"></p>

        <section id="choices" class="choices tarot-row" aria-live="polite"></section>
      </article>

      <aside class="control-panel">
        <section>
          <h3>生存仪表</h3>
          <div id="stats" class="stats"></div>
        </section>

        <section class="story-memory">
          <h3>关键轨迹</h3>
          <div id="memory" class="memory"></div>
        </section>

        <section class="log-wrap">
          <button id="toggle-log" class="log-toggle">行动日志 ▾</button>
          <div id="log" class="log"></div>
        </section>
      </aside>
    </section>
  </main>

  <section id="setup-screen" class="setup-screen">
    <div class="setup-card">
      <h2>输入你的身份</h2>
      <p id="premise-text"></p>

      <label class="field">
        <span>姓名</span>
        <input id="player-name" type="text" maxlength="16" placeholder="例如：陈默" />
      </label>

      <div id="profile-preview" class="preview"></div>
      <button id="btn-start" class="btn start">开始生存挑战</button>
    </div>
  </section>

  <script src="data/events.js"></script>
  <script src="engine.js"></script>
  <script src="ui.js"></script>
</body>
</html>
