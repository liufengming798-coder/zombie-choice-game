<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>尸潮余温</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-shape"></div>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>尸潮余温</h1>
        <p>男性第一人称 · 随机分支叙事 · 多结局</p>
      </div>
      <div class="top-actions">
        <button id="btn-save" class="btn ghost">保存</button>
        <button id="btn-load" class="btn ghost">读取</button>
        <button id="btn-restart" class="btn warn">重开</button>
      </div>
    </header>

    <section class="layout">
      <article class="story-card">
        <div id="stage-tag" class="stage-tag"></div>
        <h2 id="event-title"></h2>
        <p id="event-body"></p>
        <p id="event-result" class="result"></p>
        <div id="choices" class="choices"></div>
      </article>

      <aside class="side-card">
        <section>
          <h3>状态</h3>
          <div id="stats" class="stats"></div>
        </section>

        <section class="log-wrap">
          <button id="toggle-log" class="log-toggle">日志 ▾</button>
          <div id="log" class="log"></div>
        </section>
      </aside>
    </section>
  </main>

  <script src="data/events.js"></script>
  <script src="engine.js"></script>
  <script src="ui.js"></script>
</body>
</html>
