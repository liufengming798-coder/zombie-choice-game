<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>尸潮余温</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="skyline-canvas" aria-hidden="true"></canvas>
  <div class="overlay-noise" aria-hidden="true"></div>

  <main class="app-shell">
    <header class="hud-top">
      <div class="brand-wrap">
        <h1>尸潮余温</h1>
        <p id="hook-text"></p>
      </div>
      <div class="world-wrap">
        <div class="world-chip" id="world-district">区域: -</div>
        <div class="world-chip" id="world-weather">天气: -</div>
        <div class="world-chip danger" id="world-pressure">威胁: -</div>
      </div>
      <div class="top-actions">
        <button id="btn-save" class="btn ghost">保存</button>
        <button id="btn-load" class="btn ghost">读取</button>
        <button id="btn-restart" class="btn warn">重开</button>
      </div>
    </header>

    <section class="identity-bar">
      <span id="id-name" class="chip">姓名: 未命名</span>
      <span id="id-career" class="chip">职业: -</span>
      <span id="id-background" class="chip">末日角色: -</span>
      <span id="stage-tag" class="chip stage"></span>
      <span id="event-category" class="chip category">事件类型: -</span>
    </section>

    <section class="battlefield-grid">
      <article class="scene-panel">
        <div id="scene-stage" class="scene-stage neutral" aria-hidden="true">
          <div class="pulse-ring ring-a"></div>
          <div class="pulse-ring ring-b"></div>
          <div class="scan-line"></div>
          <div class="scene-label" id="scene-label">NEUTRAL</div>
        </div>
        <div class="scene-header">
          <h2 id="event-title"></h2>
          <div class="scene-sub">按 <kbd>A</kbd>/<kbd>D</kbd> 快速选择左右选项，按 <kbd>1-9</kbd> 选择对应按钮</div>
        </div>
        <p id="event-body"></p>
        <p id="event-result" class="result"></p>

        <section id="special-panel" class="special-panel hidden"></section>
        <section id="choices" class="choices" aria-live="polite"></section>
      </article>

      <aside class="control-panel">
        <section class="tactic-wrap">
          <h3>战术姿态</h3>
          <div id="tactic-buttons" class="tactic-buttons"></div>
          <p id="tactic-desc" class="muted"></p>
        </section>

        <section>
          <h3>状态仪表</h3>
          <div id="stats" class="stats"></div>
        </section>

        <section class="log-wrap">
          <button id="toggle-log" class="log-toggle">行动日志 ▾</button>
          <div id="log" class="log"></div>
        </section>
      </aside>
    </section>
  </main>

  <section id="setup-screen" class="setup-screen">
    <div class="setup-card">
      <h2>建立你的生存档案</h2>
      <p>职业与末日角色将影响起始资源、事件权重与检定体验。</p>

      <label class="field">
        <span>姓名</span>
        <input id="player-name" type="text" maxlength="12" placeholder="例如：林川" />
      </label>

      <div class="field-grid">
        <label class="field">
          <span>末日前职业</span>
          <select id="player-career"></select>
        </label>
        <label class="field">
          <span>末日角色</span>
          <select id="player-background"></select>
        </label>
      </div>

      <div id="profile-preview" class="preview"></div>
      <button id="btn-start" class="btn start">进入第1天</button>
    </div>
  </section>

  <script src="data/events.js"></script>
  <script src="engine.js"></script>
  <script src="ui.js"></script>
</body>
</html>
